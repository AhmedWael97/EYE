# docker-compose.prod.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
version: "3.9"

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always

  php-fpm:
    restart: always
    environment:
      - APP_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M

  node:
    restart: always
    # Do NOT mount ./frontend in prod — use the built image
    volumes: []
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M

  postgresql:
    # Do NOT expose DB port to the internet in production
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  clickhouse:
    # Do NOT expose ClickHouse ports to the internet in production
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    # Do NOT expose Redis port to the internet in production
    ports: []
    restart: always

  laravel-queue:
    restart: always

  laravel-horizon:
    restart: always

  laravel-reverb:
    restart: always
