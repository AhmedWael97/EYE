# ═══════════════════════════════════════════════════════════════════════════════
# EYE Analytics — Production Docker Compose (Standalone)
# ═══════════════════════════════════════════════════════════════════════════════
# Usage: docker compose -f docker-compose.prod.yml up -d --build
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: eye_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/backend:ro
      - tracker_dist:/var/www/tracker:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      php-fpm:
        condition: service_healthy
      node:
        condition: service_started
      tracker-build:
        condition: service_completed_successfully
    networks:
      - eye_net

  # ─── PHP-FPM (Laravel) — Production OPcache ──────────────────────────────
  php-fpm:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: eye_php_fpm
    restart: always
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=postgresql
      - DB_DATABASE=${DB_DATABASE:-eye}
      - DB_USERNAME=${DB_USERNAME:-eye}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - CLICKHOUSE_HOST=clickhouse
      - REVERB_HOST=laravel-reverb
    env_file:
      - ./backend/.env
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'successful'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    dns_opt:
      - ndots:0
    networks:
      - eye_net

  # ─── Next.js Frontend — Production Build ─────────────────────────────────
  node:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://eye-analsyis.live}
        NEXT_PUBLIC_API_VERSION: ${NEXT_PUBLIC_API_VERSION:-v1}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://eye-analsyis.live}
        NEXT_PUBLIC_APP_PUBLIC_KEY: ${NEXT_PUBLIC_APP_PUBLIC_KEY}
        NEXT_PUBLIC_APP_SECRET_KEY: ${NEXT_PUBLIC_APP_SECRET_KEY}
        NEXT_PUBLIC_REVERB_APP_KEY: ${NEXT_PUBLIC_REVERB_APP_KEY}
        NEXT_PUBLIC_REVERB_HOST: ${NEXT_PUBLIC_REVERB_HOST:-eye-analsyis.live}
        NEXT_PUBLIC_REVERB_PORT: ${NEXT_PUBLIC_REVERB_PORT:-443}
        NEXT_PUBLIC_REVERB_SCHEME: ${NEXT_PUBLIC_REVERB_SCHEME:-https}
    container_name: eye_node
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - ./frontend/.env.local
    depends_on:
      - php-fpm
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - eye_net

  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  postgresql:
    image: postgres:16-alpine
    container_name: eye_postgresql
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-eye}
      POSTGRES_USER: ${DB_USERNAME:-eye}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-eye} -d ${DB_DATABASE:-eye}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eye_net

  # ─── ClickHouse ──────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: eye_clickhouse
    restart: always
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./docker/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
      - ./docker/clickhouse/users.xml:/etc/clickhouse-server/users.d/custom.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q 'Ok.'"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - eye_net

  # ─── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: eye_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eye_net

  # ─── Laravel Horizon ─────────────────────────────────────────────────────
  laravel-horizon:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: eye_horizon
    restart: always
    working_dir: /var/www/backend
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/backend
    environment:
      - APP_ENV=production
      - DB_HOST=postgresql
      - DB_DATABASE=${DB_DATABASE:-eye}
      - DB_USERNAME=${DB_USERNAME:-eye}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - CLICKHOUSE_HOST=clickhouse
    env_file:
      - ./backend/.env
    depends_on:
      php-fpm:
        condition: service_healthy
    dns_opt:
      - ndots:0
    networks:
      - eye_net

  # ─── Laravel Scheduler ───────────────────────────────────────────────────
  laravel-scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: eye_scheduler
    restart: always
    working_dir: /var/www/backend
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./backend:/var/www/backend
    environment:
      - APP_ENV=production
      - DB_HOST=postgresql
      - DB_DATABASE=${DB_DATABASE:-eye}
      - DB_USERNAME=${DB_USERNAME:-eye}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - CLICKHOUSE_HOST=clickhouse
    env_file:
      - ./backend/.env
    depends_on:
      php-fpm:
        condition: service_healthy
    dns_opt:
      - ndots:0
    networks:
      - eye_net

  # ─── Laravel Reverb (WebSockets) ─────────────────────────────────────────
  laravel-reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: eye_reverb
    restart: always
    working_dir: /var/www/backend
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/backend
    environment:
      - APP_ENV=production
      - DB_HOST=postgresql
      - DB_DATABASE=${DB_DATABASE:-eye}
      - DB_USERNAME=${DB_USERNAME:-eye}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - CLICKHOUSE_HOST=clickhouse
    env_file:
      - ./backend/.env
    depends_on:
      php-fpm:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns_opt:
      - ndots:0
    networks:
      - eye_net

  # ─── Tracker JS Build ────────────────────────────────────────────────────
  tracker-build:
    image: node:20-alpine
    container_name: eye_tracker_build
    working_dir: /tracker
    volumes:
      - ./tracker:/tracker
      - ./backend:/backend
      - tracker_dist:/var/www/tracker
    command: sh -c "npm ci --prefer-offline && node build.js && cp dist/eye.min.js /var/www/tracker/eye.js"
    restart: "no"
    networks:
      - eye_net

# ─── Named Volumes ───────────────────────────────────────────────────────────
volumes:
  pg_data:
  ch_data:
  redis_data:
  tracker_dist:

# ─── Network ────────────────────────────────────────────────────────────────
networks:
  eye_net:
    driver: bridge
