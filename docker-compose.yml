# ═══════════════════════════════════════════════════════════════════════════════
# EYE Analytics — Development Docker Compose (Hot-Reload Enabled)
# ═══════════════════════════════════════════════════════════════════════════════
# Usage: docker compose up -d
#
# App:      http://localhost:8000  (Nginx → Frontend + Backend + WS)
# Reverb:   ws://localhost:8080   (WebSockets direct)
#
# NOTE: Always access the app via port 8000 (Nginx). Port 3000 is internal
#       and may not work on Docker Desktop for Windows due to WSL2 relay.
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: eye_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/backend:ro
      - tracker_dist:/var/www/tracker:ro
    depends_on:
      php-fpm:
        condition: service_healthy
      node:
        condition: service_started
      tracker-build:
        condition: service_completed_successfully
    networks:
      - eye_net

  # ─── PHP-FPM (Laravel) ───────────────────────────────────────────────────
  # DEV: mounts source + dev php.ini (opcache.validate_timestamps=1)
  php-fpm:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: eye_php_fpm
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=postgresql
      - DB_DATABASE=${DB_DATABASE:-eye}
      - DB_USERNAME=${DB_USERNAME:-eye}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - CLICKHOUSE_HOST=clickhouse
      - REVERB_HOST=laravel-reverb
    env_file:
      - ./backend/.env
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'successful'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    dns_opt:
      - ndots:0
    networks:
      - eye_net

  # ─── Next.js Frontend (Dev Server with HMR) ──────────────────────────────
  # DEV: mounts source + runs `next dev` for instant hot-reload
  node:
    image: node:20-alpine
    container_name: eye_node
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - ./frontend/.env.local
    depends_on:
      - php-fpm
    networks:
      - eye_net

  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  postgresql:
    image: postgres:16-alpine
    container_name: eye_postgresql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-eye}
      POSTGRES_USER: ${DB_USERNAME:-eye}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-eye} -d ${DB_DATABASE:-eye}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eye_net

  # ─── ClickHouse ──────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: eye_clickhouse
    restart: unless-stopped
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./docker/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
      - ./docker/clickhouse/users.xml:/etc/clickhouse-server/users.d/custom.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q 'Ok.'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eye_net

  # ─── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: eye_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eye_net

  # ─── Laravel Horizon (queue dashboard) ───────────────────────────────────
  laravel-horizon:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: eye_horizon
    restart: unless-stopped
    working_dir: /var/www/backend
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/backend
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - DB_HOST=postgresql
      - DB_DATABASE=${DB_DATABASE:-eye}
      - DB_USERNAME=${DB_USERNAME:-eye}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - CLICKHOUSE_HOST=clickhouse
    env_file:
      - ./backend/.env
    depends_on:
      php-fpm:
        condition: service_healthy
    dns_opt:
      - ndots:0
    networks:
      - eye_net

  # ─── Laravel Scheduler ───────────────────────────────────────────────────
  laravel-scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: eye_scheduler
    restart: unless-stopped
    working_dir: /var/www/backend
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - DB_HOST=postgresql
      - DB_DATABASE=${DB_DATABASE:-eye}
      - DB_USERNAME=${DB_USERNAME:-eye}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - CLICKHOUSE_HOST=clickhouse
    env_file:
      - ./backend/.env
    depends_on:
      php-fpm:
        condition: service_healthy
    dns_opt:
      - ndots:0
    networks:
      - eye_net

  # ─── Laravel Reverb (WebSockets) ─────────────────────────────────────────
  laravel-reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: eye_reverb
    restart: unless-stopped
    working_dir: /var/www/backend
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - DB_HOST=postgresql
      - DB_DATABASE=${DB_DATABASE:-eye}
      - DB_USERNAME=${DB_USERNAME:-eye}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - CLICKHOUSE_HOST=clickhouse
    env_file:
      - ./backend/.env
    depends_on:
      php-fpm:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns_opt:
      - ndots:0
    networks:
      - eye_net

  # ─── Tracker JS Build (populates tracker_dist volume) ────────────────────
  tracker-build:
    image: node:20-alpine
    container_name: eye_tracker_build
    working_dir: /tracker
    volumes:
      - ./tracker:/tracker
      - ./backend:/backend
      - tracker_dist:/var/www/tracker
    command: sh -c "npm ci --prefer-offline && node build.js && cp dist/eye.min.js /var/www/tracker/eye.js"
    restart: "no"
    networks:
      - eye_net

# ─── Named Volumes ───────────────────────────────────────────────────────────
volumes:
  pg_data:
  ch_data:
  redis_data:
  tracker_dist:
  frontend_node_modules:
  frontend_next:

# ─── Network ────────────────────────────────────────────────────────────────
networks:
  eye_net:
    driver: bridge
