version: "3.9"

services:
  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: eye_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/backend:ro
      - tracker_dist:/var/www/tracker:ro
    depends_on:
      php-fpm:
        condition: service_healthy
      node:
        condition: service_started
    networks:
      - eye_net

  # ─── PHP-FPM (Laravel) ───────────────────────────────────────────────────
  php-fpm:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: eye_php_fpm
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    environment:
      - APP_ENV=${APP_ENV:-local}
    env_file:
      - ./backend/.env
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'successful'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - eye_net

  # ─── Next.js Frontend ────────────────────────────────────────────────────
  node:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eye_node
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./frontend/.env.local
    depends_on:
      - php-fpm
    networks:
      - eye_net

  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  postgresql:
    image: postgres:16-alpine
    container_name: eye_postgresql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-eye}
      POSTGRES_USER: ${DB_USERNAME:-eye}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-eye} -d ${DB_DATABASE:-eye}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eye_net

  # ─── ClickHouse ──────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: eye_clickhouse
    restart: unless-stopped
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./docker/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
      - ./docker/clickhouse/users.xml:/etc/clickhouse-server/users.d/custom.xml:ro
    ports:
      - "8123:8123"   # HTTP interface (internal only — Nginx does not expose this)
      - "9000:9000"   # Native TCP (internal only)
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q 'Ok.'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eye_net

  # ─── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: eye_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eye_net

  # ─── Laravel Queue Worker ─────────────────────────────────────────────────
  laravel-queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: eye_queue
    restart: unless-stopped
    working_dir: /var/www/backend
    command: php artisan queue:work --queue=tracking,ai,exports,notifications,default --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - ./backend/.env
    depends_on:
      php-fpm:
        condition: service_healthy
    networks:
      - eye_net

  # ─── Laravel Horizon (queue dashboard) ───────────────────────────────────
  laravel-horizon:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: eye_horizon
    restart: unless-stopped
    working_dir: /var/www/backend
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - ./backend/.env
    depends_on:
      php-fpm:
        condition: service_healthy
    networks:
      - eye_net

  # ─── Laravel Reverb (WebSockets) ─────────────────────────────────────────
  laravel-reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: eye_reverb
    restart: unless-stopped
    working_dir: /var/www/backend
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - ./backend/.env
    depends_on:
      php-fpm:
        condition: service_healthy
    networks:
      - eye_net

# ─── Named Volumes ───────────────────────────────────────────────────────────
volumes:
  pg_data:
  ch_data:
  redis_data:
  tracker_dist:

# ─── Network ────────────────────────────────────────────────────────────────
networks:
  eye_net:
    driver: bridge
