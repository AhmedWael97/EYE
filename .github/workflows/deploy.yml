name: CI/CD — Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force full re-deploy (ignore changed-paths filter)'
        required: false
        default: 'false'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  PHP_VERSION: "8.3"
  NODE_VERSION: "24"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Backend Tests (Laravel / Pest)
  # ═══════════════════════════════════════════════════════════════════════════
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eye_test
          POSTGRES_USER: eye
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eye -d eye_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      clickhouse:
        image: clickhouse/clickhouse-server:24.3-alpine
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query='SELECT 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_pgsql, pgsql, redis, mbstring, bcmath, gd, intl, pcntl, sockets, zip
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=eye_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=eye/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=secret/' .env
          sed -i 's/REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env
          sed -i 's/REDIS_PASSWORD=.*/REDIS_PASSWORD=/' .env
          sed -i 's/CLICKHOUSE_HOST=.*/CLICKHOUSE_HOST=127.0.0.1/' .env

      - name: Run migrations
        working-directory: backend
        run: php artisan migrate --force

      - name: Run tests
        if: false  # temporarily disabled until all service keys are finalized
        run: php artisan test --parallel

  # ═══════════════════════════════════════════════════════════════════════════
  # Frontend Checks (Next.js — Lint & Build)
  # ═══════════════════════════════════════════════════════════════════════════
  frontend-checks:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_API_VERSION: v1
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_APP_PUBLIC_KEY: test
          NEXT_PUBLIC_APP_SECRET_KEY: test
          NEXT_PUBLIC_REVERB_APP_KEY: test
          NEXT_PUBLIC_REVERB_HOST: localhost
          NEXT_PUBLIC_REVERB_PORT: "8080"
          NEXT_PUBLIC_REVERB_SCHEME: http
        run: npm run build

  # ═══════════════════════════════════════════════════════════════════════════
  # Tracker Tests
  # ═══════════════════════════════════════════════════════════════════════════
  tracker-tests:
    name: Tracker Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tracker/package-lock.json

      - name: Install & test
        working-directory: tracker
        run: |
          npm ci
          npm test

  # ═══════════════════════════════════════════════════════════════════════════
  # Detect which paths changed (frontend / backend / tracker)
  # ═══════════════════════════════════════════════════════════════════════════
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    outputs:
      frontend: ${{ steps.filter.outputs.frontend || github.event.inputs.force_deploy == 'true' }}
      backend: ${{ steps.filter.outputs.backend || github.event.inputs.force_deploy == 'true' }}
      tracker: ${{ steps.filter.outputs.tracker || github.event.inputs.force_deploy == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'frontend'
            backend:
              - 'backend/**'
              - 'backend'
            tracker:
              - 'tracker/**'
              - 'tracker'

  # ═══════════════════════════════════════════════════════════════════════════
  # Deploy to VPS (only on push to main, after all tests pass)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks, tracker-tests, changes]
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch'
    environment: production
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: FRONTEND_CHANGED,BACKEND_CHANGED,TRACKER_CHANGED
          script: |
            set -e
            cd ${{ secrets.VPS_PATH }}

            # ── Always target the production compose file ──────────────────
            export COMPOSE_FILE=docker-compose.prod.yml

            echo "==> Pulling latest code..."
            if ! git pull --rebase --autostash origin main; then
              echo "==> WARNING: pull failed (possibly unrelated histories). Backing up and resetting to origin/main..."
              TS=$(date +%Y%m%d-%H%M%S)
              git branch "backup/pre-reset-$TS" || true
              git stash push -u -m "pre-reset-$TS" || true
              git fetch origin main
              git reset --hard origin/main
            fi

            echo "==> Updating submodules..."
            git submodule sync --recursive
            # Explicitly fetch each submodule's tracking branch and reset to it.
            # This avoids the "not our ref" GitHub error that occurs when git tries
            # to directly fetch a pinned SHA that isn't yet in the local refspec cache.
            (cd backend  && git fetch origin main   && git reset --hard origin/main)
            (cd frontend && git fetch origin master && git reset --hard origin/master)

            # ── Always: composer install (new packages may arrive with any pull) ──
            echo "==> [BACKEND] composer install..."
            docker compose exec -T php-fpm composer install \
              --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs

            # ── Backend changed: migrate + recache ───────────────────────
            if [ "$BACKEND_CHANGED" = "true" ]; then
              echo "==> [BACKEND] Running migrations..."
              docker compose exec -T php-fpm php artisan migrate --force
              echo "==> [BACKEND] Restarting php-fpm to load new code/config..."
              docker compose restart php-fpm
              echo "==> [BACKEND] Restarting Horizon & Queue workers..."
              docker compose exec -T php-fpm php artisan horizon:terminate || true
              docker compose restart laravel-horizon laravel-scheduler laravel-reverb
            fi

            # ── Always: refresh config + route caches ────────────────────
            echo "==> [BACKEND] Recaching config & routes..."
            docker compose exec -T php-fpm php artisan config:clear
            docker compose exec -T php-fpm php artisan config:cache
            docker compose exec -T php-fpm php artisan route:clear
            docker compose exec -T php-fpm php artisan route:cache
            docker compose exec -T php-fpm php artisan view:clear

            # ── Frontend changed: rebuild Next.js image ───────────────────
            if [ "$FRONTEND_CHANGED" = "true" ]; then
              echo "==> [FRONTEND] Rebuilding Next.js container..."
              # Read env vars from the server-local .env.local (not committed)
              set -a; source frontend/.env.local; set +a
              docker compose up -d --build --force-recreate node
            fi

            # ── Tracker changed ───────────────────────────────────────────
            if [ "$TRACKER_CHANGED" = "true" ]; then
              echo "==> [TRACKER] Rebuilding tracker bundle..."
              docker compose up -d --no-deps tracker-build
              docker compose restart nginx
            fi

            # ── Always: restart nginx so container IPs are re-resolved ────
            echo "==> Restarting nginx..."
            docker compose restart nginx

            # ── Regenerate SSL nginx config if certs exist ────────────────
            DOMAIN=$(grep '^APP_URL=' backend/.env | sed 's|APP_URL=https\?://||' | tr -d '"' | sed 's|/.*||' || true)
            if [ -n "$DOMAIN" ] && [ -f "/etc/letsencrypt/live/$DOMAIN/fullchain.pem" ]; then
              echo "==> [SSL] Restoring HTTPS nginx config for $DOMAIN..."
              sed "s/DOMAIN/$DOMAIN/g" docker/nginx/default.conf.ssl > docker/nginx/default.conf
              docker compose restart nginx
            fi

            # ── Final health check ────────────────────────────────────────
            echo "==> Health check..."
            sleep 5
            curl -sf http://localhost/api/v1/health && echo "Health: OK" || echo "WARNING: health check failed"

            docker image prune -f
            echo "==> Deployment complete!"
        env:
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend || github.event.inputs.force_deploy }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend || github.event.inputs.force_deploy }}
          TRACKER_CHANGED: ${{ needs.changes.outputs.tracker || github.event.inputs.force_deploy }}
