<div class="relative group">

</div>
</div>

<label class="label-sm text-on-surface-variant uppercase tracking-[0.05em] text-[0.6875rem] ml-1">Work Email</label>

</div>
</div>
<div class="space-y-1.5">
<label class="label-sm text-on-surface-variant uppercase tracking-[0.05em] text-[0.6875rem] ml-1">Password</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none focus:ring-2 focus:ring-primary/50 text-on-surface rounded-lg py-3 px-4 placeholder:text-outline/40 transition-all" placeholder="••••••••" type="password"/>

</div>

<span>Get Started</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
