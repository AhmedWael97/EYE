</div>

<a class="text-[0.75rem] font-semibold text-primary hover:text-secondary-fixed-dim transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-lg px-4 py-3 text-on-surface placeholder-slate-500 focus:ring-2 focus:ring-primary/40 transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
