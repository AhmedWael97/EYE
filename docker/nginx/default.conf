upstream php_fpm {
    server php-fpm:9000;
    keepalive 32;
}

upstream next_app {
    server node:3000;
    keepalive 16;
}

upstream reverb_ws {
    server laravel-reverb:8080;
    keepalive 8;
}

# ─── Rate limiting zones ──────────────────────────────────────────────────────
# Shared memory zone for track endpoint (key = client IP)
limit_req_zone $binary_remote_addr zone=track_limit:10m rate=300r/m;
# Shared memory zone for auth endpoints
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    root /var/www/backend/public;
    index index.php;

    client_max_body_size 10M;

    # ─── Security headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Tracker static files ─────────────────────────────────────────────
    location /tracker/ {
        alias /var/www/tracker/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        try_files $uri =404;
    }

    # ─── Tracking ingestion (rate limited) ───────────────────────────────
    location = /api/track {
        limit_req zone=track_limit burst=50 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # ─── Auth endpoints (rate limited) ───────────────────────────────────
    location ~ ^/api/auth/(login|forgot-password|two-factor/challenge) {
        limit_req zone=auth_limit burst=5 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # ─── Health check (no logging to avoid noise) ────────────────────────
    location = /api/health {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # ─── All other /api/* routes → Laravel/PHP-FPM ───────────────────────
    location /api/ {
        try_files $uri /index.php?$query_string;
    }

    # ─── WebSocket upgrade → Reverb ──────────────────────────────────────
    location /app/ {
        proxy_pass http://reverb_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ─── PHP-FPM handler ─────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ─── Everything else → Next.js ───────────────────────────────────────
    location / {
        proxy_pass http://next_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ─── Static assets from Next.js build ────────────────────────────────
    location /_next/static/ {
        proxy_pass http://next_app;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── Deny access to hidden files ─────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
